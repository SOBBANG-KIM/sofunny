<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>원터치 아임온 앱 설치</title>
  <link rel="icon" href="web_logo.png" />
  <style>
    :root {
      --bg: #f4f3fb;
      --surface: #ffffff;
      --indigo: #5a3ff0;
      --indigo-dark: #3f28c4;
      --ink: #14131a;
      --muted: #6b6880;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(90, 63, 240, 0.12);
      padding: 40px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      object-fit: cover;
      margin-bottom: 18px;
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; font-weight: 700; }
    p.desc { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin: 0 0 26px; }
    .badges { display: flex; flex-direction: column; gap: 12px; }
    .badge {
      display: block;
      text-decoration: none;
      padding: 15px 20px;
      border-radius: 16px;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .badge small { display: block; font-size: 0.72rem; opacity: 0.7; font-weight: 500; margin-bottom: 2px; }
    .badge:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(0, 0, 0, 0.16); }
    .badge-ios { background: var(--ink); color: #fff; }
    .badge-android { background: var(--indigo); color: #fff; }
    .home-link {
      display: inline-block;
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.82rem;
      text-decoration: none;
    }
    .home-link:hover { color: var(--indigo); }
    /* 리다이렉트가 진행되는 모바일에서는 잠깐 "이동 중" 문구를 우선 노출 */
    .redirecting .desc-default { display: none; }
    .desc-redirecting { display: none; }
    .redirecting .desc-redirecting { display: block; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <img src="web_logo.png" alt="원터치 아임온" class="logo" />
    <h1>원터치 아임온</h1>
    <p class="desc desc-default">아래에서 사용 중인 기기의 스토어를 선택해 앱을 설치하세요.</p>
    <p class="desc desc-redirecting">스토어로 이동 중이에요…<br />잠시 후에도 열리지 않으면 아래 버튼을 눌러 주세요.</p>

    <div class="badges">
      <a class="badge badge-ios"
         href="https://apps.apple.com/kr/app/%EC%9B%90%ED%84%B0%EC%B9%98-%EC%95%84%EC%9E%84%EC%98%A8/id6761676518">
        <small>App Store에서</small>
        iPhone 설치
      </a>
      <a class="badge badge-android"
         href="https://play.google.com/store/apps/details?id=com.sofunny.imon">
        <small>Google Play에서</small>
        Android 설치
      </a>
    </div>

    <a class="home-link" href="index.html">아임온 홈페이지 보기</a>
  </div>

  <script>
    (function () {
      var APPSTORE = "https://apps.apple.com/kr/app/%EC%9B%90%ED%84%B0%EC%B9%98-%EC%95%84%EC%9E%84%EC%98%A8/id6761676518";
      var PLAYSTORE = "https://play.google.com/store/apps/details?id=com.sofunny.imon";

      var ua = navigator.userAgent || navigator.vendor || "";
      var isAndroid = /android/i.test(ua);
      // iPadOS 13+ 는 UA가 Macintosh로 보고되므로 터치 지원 여부로 보완 감지
      var isIOS = /iphone|ipad|ipod/i.test(ua) ||
                  (/Macintosh/i.test(ua) && typeof navigator.maxTouchPoints === "number" && navigator.maxTouchPoints > 1);

      var target = isAndroid ? PLAYSTORE : (isIOS ? APPSTORE : null);

      if (target) {
        // 모바일: 해당 스토어로 자동 이동 (뒤로가기 시 이 페이지가 히스토리에 남지 않도록 replace)
        document.getElementById("card").classList.add("redirecting");
        window.location.replace(target);
      }
      // 데스크톱/감지 실패: 리다이렉트 없이 두 버튼 노출 (기본 상태 유지)
    })();
  </script>
</body>
</html>
